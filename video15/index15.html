<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Types of Css</title>
    <style>
        span {
            color: red;
            font-size: 18px;
            background-color: lightgray;
        }
    </style>
    <link rel="stylesheet" href="style15.css">
</head>

<body>
    <h1>Inline CSS</h1>
    <div style="color: blue; font-size: 20px; background-color: aqua;">
        I am a good boy.
    </div>
    <p style="color: green; font-size: 16px; background-color: aliceblue;">Everyone is a good boy in any way or other.
        does this even make any sense?</p>

    <h1>Internal CSS</h1>
    <span>
        This line is designed by internal css.
    </span>

    <h1>External CSS</h1>
    <p class="external-css">This line is designed by external css.</p>

</body>

</html>
