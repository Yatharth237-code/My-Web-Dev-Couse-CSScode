<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <link rel="stylesheet" href="style17.css">
</head>
<body>
    <div class="red">
        I am a div tag.
    </div>
    <span id="blue">
        I am also a div tag.
        <p>
            I am a para in a div.
        </p>
    </span>
    <div>
        <article>
            <p>I am a para in an article in a div.</p>
        </article>
    </div>
    <a href="https://www.google.com" target="_blank">Go to Google</a>
    <a href="https://www.wikipedia.org" target="_blank">Go to Wikipedia</a>
    <button class="reed" >Click Me</button>
</body>
</html>
